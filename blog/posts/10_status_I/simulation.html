<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
  .wrapper { border: 1px solid #e0dfd8; border-radius: 10px; overflow: hidden; }
  .controls {
    padding: 10px 14px;
    border-bottom: 1px solid #e0dfd8;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: #fafaf9;
  }
  button {
    font-size: 13px; padding: 6px 16px;
    border-radius: 6px; border: 1px solid #bbb;
    background: #fff; cursor: pointer; color: #222;
  }
  button:hover { background: #f0eeea; }
  button:disabled { opacity: .4; cursor: default; }
  #counter { font-size: 13px; color: #888; }
  #info {
    padding: 10px 14px; font-size: 14px; font-weight: 600;
    color: #111; border-bottom: 1px solid #e0dfd8;
    background: #fff; min-height: 40px;
  }
  svg { display: block; background: #fff; }
  #log {
    padding: 10px 14px; font-size: 13px; color: #555;
    min-height: 50px; line-height: 1.6; background: #f8f8f7;
  }
  .legend {
    font-size: 11px; color: #999; padding: 6px 14px 10px;
    background: #f8f8f7;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="controls">
    <button id="btnNext">Next act ▶</button>
    <button id="btnReset">Reset</button>
    <span id="counter">Step 0 — 0 of 15 ties</span>
  </div>
  <div id="info">No acts yet. Click "Next act" to begin.</div>
  <svg id="svg" width="100%" viewBox="0 0 580 300"></svg>
  <div id="log">Precedence ties will appear as the group interacts...</div>
  <div class="legend">⬤ Blue = high status (H1–H3, full professors) &nbsp;|&nbsp; ○ Gray = low status (L1–L3, assistant professors) &nbsp;|&nbsp; → Orange = new tie</div>
</div>

<script>
var actors = [
  {id:0, label:'H1', x:170, y:70,  high:true},
  {id:1, label:'H2', x:290, y:50,  high:true},
  {id:2, label:'H3', x:410, y:70,  high:true},
  {id:3, label:'L1', x:170, y:230, high:false},
  {id:4, label:'L2', x:290, y:250, high:false},
  {id:5, label:'L3', x:410, y:230, high:false},
];

var steps = [
  { speaker:1, target:0, newTies:[[1,0],[1,3],[2,0]],
    log:'H2 addresses H1 (proposes discussing faculty parking). Via bystanders → H2→H1, H2→L1, H3→H1.' },
  { speaker:0, target:5, newTies:[[0,5],[0,3],[1,5],[2,5],[4,5]],
    log:'H1 addresses L3 (suggests staff privileges also be considered). Via bystanders → H1→L3, H1→L1, H2→L3, H3→L3, L2→L3.' },
  { speaker:3, target:4, newTies:[[1,4],[2,4]],
    log:'L1 addresses L2 (staff should wait until faculty is resolved). Via bystanders → H2→L2, H3→L2.' },
  { speaker:4, target:1, newTies:[],
    log:'L2 addresses H2 expressing agreement. Act of deference — no new ties.' },
  { speaker:3, target:1, newTies:[],
    log:'L1 also agrees with H2. Act of deference — no new ties.' },
  { speaker:4, target:1, newTies:[],
    log:'L2 urges H2 to proceed with recommendations. Continued deference — no new ties.' },
  { speaker:0, target:3, newTies:[[2,3],[4,3],[0,5],[5,3]],
    log:'H1 addresses L1 ("staff privileges will be taken up last"). Via bystanders → H3→L1, L2→L1, H1→L3, L3→L1.' },
  { speaker:2, target:0, newTies:[[3,0]],
    log:'H3 addresses H1 in agreement. Via bystander → L1→H1.' },
  { speaker:2, target:1, newTies:[[2,1]],
    log:'H3 addresses H2 ("too few spaces on Campus East for full professors"). Direct effect → H3→H2. ✅ Complete status order in just 9 acts!' },
];

var step = -1;
var formed = {};
var allTies = [];

function pairKey(a, b) { return a + '-' + b; }

function draw(ties, spk, tgt) {
  var svg = document.getElementById('svg');
  var NS = 'http://www.w3.org/2000/svg';

  svg.innerHTML = '<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';

  ties.forEach(function(t) {
    var a = actors[t.from], b = actors[t.to];
    var dx = b.x - a.x, dy = b.y - a.y;
    var len = Math.sqrt(dx*dx + dy*dy);
    var r = 22;
    var x1 = a.x + (dx/len)*r, y1 = a.y + (dy/len)*r;
    var x2 = b.x - (dx/len)*(r+4), y2 = b.y - (dy/len)*(r+4);
    var line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', t.isNew ? '#D85A30' : '#bbb');
    line.setAttribute('stroke-width', t.isNew ? '2.5' : '1.2');
    line.setAttribute('marker-end', 'url(#arr)');
    line.setAttribute('opacity', t.isNew ? '1' : '0.6');
    svg.appendChild(line);
  });

  actors.forEach(function(a, i) {
    var fill, stroke, sw, tc;
    if (i === spk)       { fill='#185FA5'; stroke='#0C447C'; sw=2.5; tc='#fff'; }
    else if (i === tgt)  { fill='#0F6E56'; stroke='#085041'; sw=2.5; tc='#fff'; }
    else if (a.high)     { fill='#E6F1FB'; stroke='#378ADD'; sw=1;   tc='#185FA5'; }
    else                 { fill='#f1efe8'; stroke='#b4b2a9'; sw=1;   tc='#5f5e5a'; }

    var c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', a.x); c.setAttribute('cy', a.y); c.setAttribute('r', 22);
    c.setAttribute('fill', fill); c.setAttribute('stroke', stroke);
    c.setAttribute('stroke-width', sw);
    svg.appendChild(c);

    var tx = document.createElementNS(NS, 'text');
    tx.setAttribute('x', a.x); tx.setAttribute('y', a.y);
    tx.setAttribute('text-anchor', 'middle');
    tx.setAttribute('dominant-baseline', 'central');
    tx.setAttribute('font-size', '12');
    tx.setAttribute('font-weight', '700');
    tx.setAttribute('fill', tc);
    tx.textContent = a.label;
    svg.appendChild(tx);
  });
}

function reset() {
  step = -1; formed = {}; allTies = [];
  document.getElementById('counter').textContent = 'Step 0 — 0 of 15 ties';
  document.getElementById('info').textContent = 'No acts yet. Click "Next act" to begin.';
  document.getElementById('log').textContent = 'Precedence ties will appear as the group interacts...';
  document.getElementById('btnNext').disabled = false;
  draw([], undefined, undefined);
}

function next() {
  step++;
  if (step >= steps.length) {
    document.getElementById('btnNext').disabled = true;
    return;
  }
  var s = steps[step];

  allTies.forEach(function(t) { t.isNew = false; });

  s.newTies.forEach(function(t) {
    var k = pairKey(t[0], t[1]);
    if (!formed[k]) {
      formed[k] = true;
      allTies.push({ from: t[0], to: t[1], isNew: true });
    }
  });

  var total = Object.keys(formed).length;
  document.getElementById('counter').textContent =
    'Step ' + (step+1) + ' of ' + steps.length + ' — ' + total + ' of 15 ties';
  document.getElementById('info').textContent =
    'Act ' + (step+1) + ': ' + actors[s.speaker].label + ' addresses ' + actors[s.target].label;
  document.getElementById('log').textContent = s.log;

  if (step === steps.length - 1) {
    document.getElementById('btnNext').disabled = true;
  }

  draw(allTies, s.speaker, s.target);
}

document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnReset').addEventListener('click', reset);

reset();
</script>
</body>
</html>
